name: Build & Deploy Vite App to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Clean Vite cache
        run: rm -rf node_modules/.vite

      - name: Build Vite app
        run: npm run build

      - name: Stage Backend Files to dist
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          mkdir -p dist
          # copy api folder if present
          if [ -d api ]; then
            cp -r api dist/
          else
            echo "No api directory to copy"
          fi

          # copy sync_db.php if present
          if [ -f sync_db.php ]; then
            cp sync_db.php dist/
          else
            echo "No sync_db.php to copy"
          fi

          # Prefer committed .env if present; otherwise create from secrets if available
          if [ -f .env ]; then
            cp .env dist/
          else
            if [ -n "$DB_HOST" ] || [ -n "$DB_USER" ] || [ -n "$DB_PASSWORD" ] || [ -n "$JWT_SECRET" ] || [ -n "$API_KEY" ]; then
              echo "Creating dist/.env from provided secrets"
              {
                [ -n "$DB_HOST" ] && echo "DB_HOST=$DB_HOST"
                [ -n "$DB_USER" ] && echo "DB_USER=$DB_USER"
                [ -n "$DB_PASSWORD" ] && echo "DB_PASSWORD=$DB_PASSWORD"
                [ -n "$JWT_SECRET" ] && echo "JWT_SECRET=$JWT_SECRET"
                [ -n "$API_KEY" ] && echo "API_KEY=$API_KEY"
              } > dist/.env
            else
              echo "No .env and no relevant secrets found — skipping .env creation"
            fi
          fi

      - name: Deploy dist to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          local-dir: dist/
          server-dir: /public_html/
          dangerous-clean-slate: true