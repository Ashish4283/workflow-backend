name: Build & Deploy Vite App to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Clean Vite cache
        run: rm -rf node_modules/.vite

      - name: Create frontend .env for build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
        run: |
          echo "Preparing .env for Vite build"
          # Only write known VITE_ variables used by the app
          > .env
          if [ -n "$VITE_GOOGLE_CLIENT_ID" ]; then echo "VITE_GOOGLE_CLIENT_ID=$VITE_GOOGLE_CLIENT_ID" >> .env; fi
          if [ -n "$VITE_API_BASE_URL" ]; then echo "VITE_API_BASE_URL=$VITE_API_BASE_URL" >> .env; fi
          if [ -n "$VITE_GEMINI_API_KEY" ]; then echo "VITE_GEMINI_API_KEY=$VITE_GEMINI_API_KEY" >> .env; fi
          echo "Created .env with client-side variables for build"

      - name: Build Vite app
        run: npm run build

      - name: Stage Backend Files to dist
        env:
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          mkdir -p dist
          # copy api folder if present
          if [ -d api ]; then
            cp -r api dist/
          else
            echo "No api directory to copy"
          fi

          # copy sync_db.php if present
          if [ -f sync_db.php ]; then
            cp sync_db.php dist/
          else
            echo "No sync_db.php to copy"
          fi

          echo "Backend staging complete (skipping local .env creation - using server-side config)"

      - name: Deploy dist to Hostinger via robust lftp
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update -y && sudo apt-get install -y lftp
          echo "Initiating robust parallel mirror via lftp..."
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" <<EOF
            set ssl:verify-certificate no
            set net:timeout 10
            set net:max-retries 3
            set net:reconnect-interval-base 5
            mirror --reverse --delete-first --parallel=10 \
                   --exclude .env --exclude .git/ --exclude .gitattributes \
                   dist/ /public_html/
            bye
          EOF
          echo "Deployment sync complete."

      - name: Verify uploaded files on FTP (list site root)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          echo "Installing lftp to inspect remote files"
          sudo apt-get update -y
          sudo apt-get install -y lftp
          echo "Listing /public_html/ (non-sensitive filenames only)"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "set ssl:verify-certificate no; cls -1 /public_html/; bye"
          echo "Checking for .env at site root"
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "set ssl:verify-certificate no; cls -1 /public_html/.env; bye" || echo ".env check completed"