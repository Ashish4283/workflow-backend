name: Build & Deploy Vite App to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Clean Vite cache
        run: rm -rf node_modules/.vite

      - name: Create frontend .env for build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_TM_BACKEND_URL: ${{ secrets.VITE_TM_BACKEND_URL }}
        run: |
          echo "Preparing .env for Vite build"
          > .env
          if [ -n "$VITE_GOOGLE_CLIENT_ID" ]; then echo "VITE_GOOGLE_CLIENT_ID=$VITE_GOOGLE_CLIENT_ID" >> .env; fi
          if [ -n "$VITE_API_BASE_URL" ]; then echo "VITE_API_BASE_URL=$VITE_API_BASE_URL" >> .env; fi
          if [ -n "$VITE_GEMINI_API_KEY" ]; then echo "VITE_GEMINI_API_KEY=$VITE_GEMINI_API_KEY" >> .env; fi
          if [ -n "$VITE_TM_BACKEND_URL" ]; then echo "VITE_TM_BACKEND_URL=$VITE_TM_BACKEND_URL" >> .env; fi
          # Also copy to tm-client for the build
          mkdir -p tm-client
          cp .env tm-client/

      - name: Build Primary App
        run: npm run build

      - name: Build TradeMaster Frontend
        run: |
          cd tm-client
          npm install
          npm run build
          cd ..
          # Overwrite the TradeMaster folder at the root with the fresh build
          rm -rf TradeMaster
          cp -r tm-client/dist TradeMaster

      - name: Stage Extra Files to dist
        run: |
          mkdir -p dist
          if [ -d api ]; then cp -r api dist/; fi
          if [ -f sync_db.php ]; then cp sync_db.php dist/; fi
          if [ -f diagnostics.php ]; then cp diagnostics.php dist/; fi
          if [ -d TradeMaster ]; then cp -r TradeMaster dist/; fi
          # Backend source for reference (won't run on Hostinger Premium)
          if [ -d tm-api ]; then cp -r tm-api dist/; fi

      - name: Check dist content
        run: ls -R dist

      - name: Deploy to Hostinger (Resilient FTP)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode true;
            set net:timeout 120;
            set net:max-retries 100;
            set net:reconnect-interval-base 20;
            set net:reconnect-interval-multiplier 2;
            open -u $FTP_USERNAME,$FTP_PASSWORD $FTP_SERVER;
            ls -F;
            mirror -R --no-perms --no-symlinks --parallel=10 dist/ .;
            quit
          "